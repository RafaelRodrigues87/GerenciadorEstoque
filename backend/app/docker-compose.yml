version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: estoquefacil-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: estoquefacil
      MYSQL_USER: estoquefacil
      MYSQL_PASSWORD: 123
    ports:
      - "3306:3306"
    volumes:
      - estoquefacil-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  estoquefacil-mysql-data: