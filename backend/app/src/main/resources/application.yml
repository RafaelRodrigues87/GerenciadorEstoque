spring:
  application:
    name: estoquefacil

  datasource:
    url: jdbc:mysql://localhost:3306/estoquefacil?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    username: estoquefacil
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: troque-esta-chave-por-uma-bem-longa-e-aleatoria-antes-de-ir-pra-producao
  expiracao-ms: 86400000

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug